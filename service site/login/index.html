<!DOCTYPE html>
<html lang="en">

<head> 
    <meta charset="UTF-8">
    <title>The Cutting Room</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <p class="navbar-title">The Cutting Room</p>

        <div class="navbar-buttons">
            <button class="navbar-button" onClick="window.location.href = '../home/index.html'">Home</button>
            <button class="navbar-button" onClick="window.location.href = '../appointment/index.html'">Appointments</button>
            <button class="navbar-button" onclick="window.location.href = '../jobs/index.html'";>Jobs</button>
        </div>
    </div>

    

    <main id="main-content">
        <img id="background-image" src="../images/login.webp">
        <div id="login-container">
            <div id="content">   
                <p class="container-title">Login</p>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <div class="button-row">
                    <button type="button" id="register-btn">Register</button>
                    <button type="submit" id="login-btn">Login</button>
                </div>
            </div>
            

        <script type="module" src="login.js"></script>
    </main>
</body>
</html>
